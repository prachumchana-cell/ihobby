name: Build PWA APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ดึงไฟล์ทั้งหมด
        uses: actions/checkout@v4

      - name: แสดงรายการไฟล์ (เช็ค manifest.json มีจริงไหม)
        run: ls -la

      - name: ติดตั้ง Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ''

      - name: สร้าง APK พร้อมระบุเส้นทางชัดเจน
        run: |
          mkdir -p ./output
          npx @pwabuilder/cli@latest package \
            --platform android \
            --out ./output \
            --manifest "$(pwd)/manifest.json" \
            --android-package-name "com.prachumchana.ihobby" \
            --android-app-name "ihobby"

      - name: แนบไฟล์ผลลัพธ์
        uses: actions/upload-artifact@v4
        with:
          name: APK-ผลลัพธ์
          path: ./output/*.apk
