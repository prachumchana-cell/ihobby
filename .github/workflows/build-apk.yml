name: Build PWA APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ดึงไฟล์
        uses: actions/checkout@v4

      - name: ติดตั้ง Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ''

      - name: สร้างโฟลเดอร์ + รัน PWABuilder ผ่าน npx (รับประกันเจอคำสั่ง)
        run: |
          mkdir -p ./output
          npx @pwabuilder/cli@latest package \
            --platform android \
            --out ./output \
            --manifest ./manifest.json \
            --android-package-name "com.repo.iHobby" \
            --android-app-name "iHobby"

      - name: แนบไฟล์ APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-ผลลัพธ์
          path: ./output/*.apk
