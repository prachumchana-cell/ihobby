name: Build PWA APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ดึงไฟล์ทั้งหมด
        uses: actions/checkout@v4

      - name: เช็คไฟล์และโครงสร้าง
        run: |
          ls -la
          test -f manifest.json || exit 1

      - name: ติดตั้ง Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ''

      - name: สร้าง APK
        run: |
          mkdir -p ./output
          npx @pwabuilder/cli@latest package \
            --platform android \
            --out ./output \
            --manifest ./manifest.json \
            --android-package-name "com.prachumchana.ihobby" \
            --android-app-name "ihobby" \
            --android-app-version "1.0.0"

      - name: แนบไฟล์ผลลัพธ์
        uses: actions/upload-artifact@v4
        with:
          name: APK-ผลลัพธ์
          path: ./output/*.apk
