<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  </style>

<body>
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <title>iHobby - คลังกันพลาของฉัน</title>
	<style>
    /* ===== หน้าจอเริ่มต้น ===== */
    #splashScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
    }
    #splashScreen img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
    }
    /* ซ่อนเนื้อหาหลักตอนโหลด */
    #mainContent {
        opacity: 0;
        transition: opacity 0.5s ease-in;
    }
	</style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            padding: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            max-width: 180px;
            margin-bottom: 8px;
        }

        h1 {
            color: #2c3e50;
            font-size: 20px;
            line-height: 1.4;
        }

        .form-container {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }

        .form-container h3 {
            margin-bottom: 5px;
            font-size: 17px;
        }

        .edit-mode {
            color: #f59e0b;
            font-size: 13px;
            font-weight: normal;
            margin-left: 6px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .note-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }

        .pinned-icon {
            width: 16px;
            height: 16px;
            display: block;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        .condition-options {
            display: flex;
            gap: 20px;
            padding: 8px 0;
            flex-wrap: wrap;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .option-item input {
            width: auto;
            cursor: pointer;
        }

        .image-preview {
            margin-top: 8px;
            max-width: 120px;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            display: none;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-cancel {
            background-color: #6b7280;
            color: white;
            display: none;
        }

        .btn-cancel.show {
            display: block;
        }

        .btn-cancel:hover {
            background-color: #4b5563;
        }

        .export-section {
            background: white;
            padding: 14px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .export-title {
            width: 100%;
            text-align: center;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .export-btn {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
            flex: 1;
            min-width: 130px;
        }

        .btn-json { background: #8b5cf6; }
        .btn-json:hover { background: #7c3aed; }

        .btn-import { background: #3b82f6; }
        .btn-import:hover { background: #2563eb; }

        .table-container {
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .table-container h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #2c3e50;
            padding: 0 4px;
        }

        /* ====== แสดงผลแบบการ์ดบนมือถือ ====== */
        .card-view {
            display: grid;
            gap: 12px;
        }

        .gunpla-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 12px;
            background: #fff;
        }

        .card-header {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .card-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .card-title {
            font-weight: 700;
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .card-grade {
            font-size: 13px;
            color: #666;
        }

        .card-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 13px;
            color: #444;
            margin-bottom: 10px;
        }

        .card-details span strong {
            color: #2c3e50;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .edit-btn {
            flex: 1;
            background-color: #f59e0b;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .delete-btn {
            flex: 1;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .empty {
            text-align: center;
            color: #95a5a6;
            padding: 30px 15px;
            font-size: 14px;
        }

        /* ซ่อนตารางปกติ แสดงเฉพาะการ์ดบนมือถือ */
        table { display: none; }
    </style>
</head>
<body>
	<!-- หน้าจอเริ่มต้น -->
	<div id="splashScreen">
		<img src="images/Splash.png" alt="iHobby">
	</div>

	<!-- ครอบเนื้อหาทั้งหมดไว้ในนี้ -->
	<div id="mainContent">
    <div class="header">
        <img src="images/ihobby-logo.png" alt="iHobby Logo" class="logo" id="appLogo">
        <h1>คลังกันพลาของฉัน<br>(เรียงตามวันที่ซื้อ ล่าสุดก่อน)</h1>
    </div>

    <div class="form-container">
        <h3 id="formTitle">เพิ่มรายการกันพลาใหม่ <span id="editNotice" class="edit-mode"></span></h3>
        <br>
        <form id="gunplaForm">
            <input type="hidden" id="editId">

            <div class="form-group">
                <label>ชื่อ/รุ่นกันพลา *</label>
                <input type="text" id="name" required placeholder="เช่น RX-78-2 Gundam">
            </div>

            <div class="form-group">
                <label>เกรด</label>
                <select id="grade">
                    <option value="">-- เลือกเกรด --</option>
                    <option value="FG (First Grade)">FG (First Grade)</option>
                    <option value="EG (Entry Grade)">EG (Entry Grade)</option>
                    <option value="HG (High Grade)">HG (High Grade)</option>
                    <option value="RG (Real Grade)">RG (Real Grade)</option>
                    <option value="RE/100 (REBORN-One Hundred)">RE/100</option>
                    <option value="MG (Master Grade)">MG (Master Grade)</option>
                    <option value="MGEX (Master Grade Extreme)">MGEX</option>
                    <option value="PG (Perfect Grade)">PG (Perfect Grade)</option>
                    <option value="PG Unleashed (PGU)">PG Unleashed (PGU)</option>
                    <option value="Mega Size Model">Mega Size Model</option>
                    <option value="SDEX (SD Gundam EX-Standard)">SDEX</option>
                    <option value="SDCS (SD Gundam Cross Silhouette)">SDCS</option>
                    <option value="SDW HEROES / SD Sangoku Soketsuden">SDW/SSS</option>
                    <option value="MGSD (Master Grade SD)">MGSD</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
            </div>

            <div class="form-group">
                <label>สเกล</label>
                <select id="scale">
                    <option value="">-- เลือกสเกล --</option>
                    <option value="1/35">1/35</option>
                    <option value="1/48">1/48</option>
                    <option value="1/60">1/60</option>
                    <option value="1/100">1/100</option>
                    <option value="1/144">1/144</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
            </div>

            <div class="form-group">
                <label>วันที่ซื้อ</label>
                <input type="date" id="buyDate">
            </div>

            <div class="form-group">
                <label>วันที่ได้รับ</label>
                <input type="date" id="receiveDate">
            </div>

            <div class="form-group">
                <label>ร้านค้า/แหล่งที่มา</label>
                <input type="text" id="shop" placeholder="เช่น ร้านบันได, Shopee">
            </div>

            <div class="form-group">
                <label>ราคา (บาท)</label>
                <input type="number" id="price" min="0" step="0.01" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>รูปภาพ</label>
                <input type="file" id="image" accept="image/*" capture="environment">
                <img id="imagePreview" class="image-preview" alt="ตัวอย่างรูป">
            </div>

            <div class="note-header">
                <img src="images/pinned_icon.png" alt="ปักหมุด" class="pinned-icon">
                <span>หมายเหตุ</span>
            </div>

            <div class="form-group">
                <label>ประเภทสินค้า</label>
                <div class="condition-options">
                    <label class="option-item">
                        <input type="radio" name="productType" id="typeNew" value="มือ 1">
                        มือ 1
                    </label>
                    <label class="option-item">
                        <input type="radio" name="productType" id="typeUsed" value="มือ 2">
                        มือ 2
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>สภาพกล่อง</label>
                <textarea id="boxCondition" rows="2" placeholder="เช่น กล่องคม/ไม่คม"></textarea>
            </div>  

			<div class="form-group">
                <label>สถานะประกอบ</label>
                <textarea id="buildStatus" rows="2" placeholder="เช่น ยังไม่ประกอบ/ประกอบแล้ว"></textarea>
            </div>

            <div class="form-group">
                <label>บันทึกเพิ่มเติม</label>
                <textarea id="comment" rows="2" placeholder="เช่น ต่อง่าย/งานกาว"></textarea>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn btn-primary" id="submitBtn">บันทึกรายการ</button>
                <button type="button" class="btn btn-cancel" id="cancelBtn">ยกเลิก</button>
            </div>
        </form>
    </div>

    <div class="export-section">
        <div class="export-title">📂 สำรอง / กู้คืนข้อมูล</div>
        <button class="export-btn btn-json" onclick="exportJSON()">💾 ส่งออก JSON</button>
        <button class="export-btn btn-import" onclick="document.getElementById('importFile').click()">📥 นำเข้าข้อมูล</button>
        <input type="file" id="importFile" accept=".json" style="display: none" onchange="importData(event)">
    </div>

    <div class="table-container">
        <h3>รายการกันพลาทั้งหมด</h3>
        <div id="cardContainer" class="card-view"></div>
    </div>

    <script>
        let gunplaList = JSON.parse(localStorage.getItem('gunplaData')) || [];
        const form = document.getElementById('gunplaForm');
        const cardContainer = document.getElementById('cardContainer');
        const imageInput = document.getElementById('image');
        const imagePreview = document.getElementById('imagePreview');
        const editIdInput = document.getElementById('editId');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const [year, month, day] = dateStr.split('-');
            return `${day}/${month}/${year}`;
        }

        function sortData() {
            gunplaList.sort((a, b) => {
                if (!a.buyDate) return 1;
                if (!b.buyDate) return -1;
                return new Date(b.buyDate) - new Date(a.buyDate);
            });
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        cancelBtn.addEventListener('click', resetForm);

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const editId = editIdInput.value;
            const newItem = {
                id: editId ? Number(editId) : Date.now(),
                name: document.getElementById('name').value,
                grade: document.getElementById('grade').value,
                scale: document.getElementById('scale').value,
                buyDate: document.getElementById('buyDate').value,
                receiveDate: document.getElementById('receiveDate').value,
                productType: document.querySelector('input[name="productType"]:checked')?.value || '',
                shop: document.getElementById('shop').value,
                price: document.getElementById('price').value,
                image: imagePreview.style.display === 'block' ? imagePreview.src : null,
                boxCondition: document.getElementById('boxCondition').value,
                buildStatus: document.getElementById('buildStatus').value,
                comment: document.getElementById('comment').value
            };

            if (editId) {
                const index = gunplaList.findIndex(item => item.id === Number(editId));
                if (index !== -1) {
                    if (!newItem.image) newItem.image = gunplaList[index].image;
                    gunplaList[index] = newItem;
                    alert('แก้ไขข้อมูลเรียบร้อยแล้วค่ะ! ✅');
                }
            } else {
                gunplaList.push(newItem);
                alert('บันทึกข้อมูลเรียบร้อยแล้วค่ะ! 🎉');
            }

            saveData();
            renderCards();
            resetForm();
        });

        function editItem(id) {
            const item = gunplaList.find(data => data.id === id);
            if (!item) return;

            editIdInput.value = item.id;
            formTitle.innerHTML = 'แก้ไขรายการกันพลา <span class="edit-mode">(กำลังแก้ไข)</span>';
            submitBtn.textContent = 'บันทึกการแก้ไข';
            cancelBtn.classList.add('show');

            document.getElementById('name').value = item.name || '';
            document.getElementById('grade').value = item.grade || '';
            document.getElementById('scale').value = item.scale || '';
            document.getElementById('buyDate').value = item.buyDate || '';
            document.getElementById('receiveDate').value = item.receiveDate || '';
            
            if (item.productType === 'มือ 1') {
                document.getElementById('typeNew').checked = true;
            } else if (item.productType === 'มือ 2') {
                document.getElementById('typeUsed').checked = true;
            } else {
                document.querySelectorAll('input[name="productType"]').forEach(r => r.checked = false);
            }

            document.getElementById('shop').value = item.shop || '';
            document.getElementById('price').value = item.price || '';
            document.getElementById('boxCondition').value = item.boxCondition || '';
            document.getElementById('buildStatus').value = item.buildStatus || '';
            document.getElementById('comment').value = item.comment || '';

            if (item.image) {
                imagePreview.src = item.image;
                imagePreview.style.display = 'block';
            } else {
                imagePreview.style.display = 'none';
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            form.reset();
            editIdInput.value = '';
            formTitle.innerHTML = 'เพิ่มรายการกันพลาใหม่ <span id="editNotice" class="edit-mode"></span>';
            submitBtn.textContent = 'บันทึกรายการ';
            cancelBtn.classList.remove('show');
            imagePreview.style.display = 'none';
        }

        function renderCards() {
            cardContainer.innerHTML = '';
            sortData();

            if (gunplaList.length === 0) {
                cardContainer.innerHTML = `<div class="empty">ยังไม่มีรายการกันพลา เริ่มเพิ่มรายการแรกได้เลยค่ะ!</div>`;
                return;
            }

            gunplaList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'gunpla-card';
                card.innerHTML = `
                    <div class="card-header">
                        ${item.image ? `<img src="${item.image}" class="card-img" alt="${item.name}">` : `<div class="card-img" style="background:#eee;display:flex;align-items:center;justify-content:center;color:#999;">ไม่มีรูป</div>`}
                        <div>
                            <div class="card-title">${item.name}</div>
                            <div class="card-grade">${item.grade || '-'}</div>
                            <div style="font-size:12px;color:#888;">${item.scale || '-'}</div>
                        </div>
                    </div>
                    <div class="card-details">
                        <span><strong>ซื้อ:</strong> ${formatDate(item.buyDate)}</span>
                        <span><strong>รับ:</strong> ${formatDate(item.receiveDate)}</span>
                        <span><strong>ประเภท:</strong> ${item.productType || '-'}</span>
                        <span><strong>ราคา:</strong> ${item.price ? item.price+' บาท' : '-'}</span>
                        <span><strong>กล่อง:</strong> ${item.boxCondition || '-'}</span>
                        <span><strong>ประกอบ:</strong> ${item.buildStatus || '-'}</span>
                    </div>
                    ${item.comment ? `<div style="font-size:12px;color:#666;margin-bottom:8px;"><strong>บันทึก:</strong> ${item.comment}</div>` : ''}
                    <div class="card-actions">
                        <button class="edit-btn" onclick="editItem(${item.id})">แก้ไข</button>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">ลบ</button>
                    </div>
                `;
                cardContainer.appendChild(card);
            });
        }

        function deleteItem(id) {
            if (confirm('ต้องการลบรายการนี้ใช่ไหมคะ?')) {
                gunplaList = gunplaList.filter(item => item.id !== id);
                saveData();
                renderCards();
                if (editIdInput.value == id) resetForm();
            }
        }

        function saveData() {
            localStorage.setItem('gunplaData', JSON.stringify(gunplaList));
        }

        function exportJSON() {
            if (gunplaList.length === 0) return alert('ไม่มีข้อมูลที่จะส่งออกครับ!');
            const dataStr = JSON.stringify(gunplaList, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gunpla-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('ส่งออกไฟล์ JSON สำเร็จครับ! ✅');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm('การนำเข้าจะแทนที่ข้อมูลปัจจุบันทั้งหมด ต้องการดำเนินการต่อไหมครับ?')) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('รูปแบบไฟล์ไม่ถูกต้อง');
                    gunplaList = imported;
                    saveData();
                    renderCards();
                    alert('นำเข้าข้อมูลสำเร็จครับ! ✅');
                } catch (err) {
                    alert('ไฟล์ข้อมูลไม่ถูกต้อง หรือเสียหายครับ! ❌');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('ลงทะเบียนสำเร็จ', reg))
                    .catch(err => console.log('ลงทะเบียนล้มเหลว', err));
            });
        }

        renderCards();
    </script>
</div> <!-- ปิด #mainContent -->
</body>
</html>
